services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: noderegistry
      POSTGRES_PASSWORD: noderegistry
      POSTGRES_DB: noderegistry
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noderegistry -d noderegistry"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-1:
    build: .
    ports:
      - "8081:8080"
    depends_on:
      - db
    environment:
      NODE_ID: "1"
      NODE_HOST: "0.0.0.0"
      NODE_PORT: "8080"
      SELF_URL: "http://node-1:8080"
      PEER_NODES: "2=http://node-2:8080,3=http://node-3:8080"
      DATABASE_URL: "postgresql://noderegistry:noderegistry@db:5432/noderegistry"

  node-2:
    build: .
    ports:
      - "8082:8080"
    depends_on:
      - db
    environment:
      NODE_ID: "2"
      NODE_HOST: "0.0.0.0"
      NODE_PORT: "8080"
      SELF_URL: "http://node-2:8080"
      PEER_NODES: "1=http://node-1:8080,3=http://node-3:8080"
      DATABASE_URL: "postgresql://noderegistry:noderegistry@db:5432/noderegistry"

  node-3:
    build: .
    ports:
      - "8083:8080"
    depends_on:
      - db
    environment:
      NODE_ID: "3"
      NODE_HOST: "0.0.0.0"
      NODE_PORT: "8080"
      SELF_URL: "http://node-3:8080"
      PEER_NODES: "1=http://node-1:8080,2=http://node-2:8080"
      DATABASE_URL: "postgresql://noderegistry:noderegistry@db:5432/noderegistry"

volumes:
  db-data:
